<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keto Startpage v2</title>
    <style>
        /* --- ESTILO GENERAL --- */
        body {
            background-image: url('https://i.imgur.com/MkEjw6u.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Separa paneles a los extremos */
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        /* --- CONTENEDOR DE BOTONES (IZQUIERDA) --- */
        .buttons-panel {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 300px;
            margin-left: 50px; /* Empuja los botones a la izquierda */
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
        }

        .btn {
            display: block;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffffff;
            color: white;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
            transform: scaleX(1.05);
        }

        /* --- CUADRO DE INFO (DERECHA PEERFECTA) --- */
        .right-container {
            position: relative;
            z-index: 1;
            margin-right: 0; /* Pegado al borde */
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Alinea el círculo con el cuadro */
        }

        .info-panel {
            background-color: #000;
            border: 2px solid #ffffff;
            padding: 30px;
            width: 450px;
            height: 75vh;
            box-sizing: border-box;
            /* EFECTO BRILLANTE CON BLUR */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* --- EL CÍRCULO GIF (ENCIMA DEL CUADRO) --- */
        .circular-gif-outer {
            width: 100px;
            height: 100px;
            background-color: #000;
            border: 2px solid #ffffff;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px white;
            margin-bottom: 15px; /* Espacio antes del cuadro */
            margin-right: 20px; /* Ajuste visual para que no esté tan en la esquina */
        }

        .circular-gif-outer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- TEXTO BLANCO Y LIMPIO --- */
        .text-block {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #ffffff; /* FORZADO A BLANCO */
            margin-bottom: 20px;
            padding: 10px;
            transition: 0.3s;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .text-block:hover {
            background: rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px white;
        }

        .info-panel h2 {
            color: white;
            text-align: center;
            letter-spacing: 3px;
            text-shadow: 0 0 10px white;
        }

        .separator {
            border-bottom: 1px solid white;
            margin: 15px 0;
            opacity: 0.5;
            box-shadow: 0 0 10px white;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .telegram-user {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            opacity: 0.6;
            font-size: 0.8rem;
        }
    </style>
</head>
