<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketoand Startpage</title>
    <style>
        body {
            background-color: #0a0a0a; /* Fondo negro que te gustó */
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* BOTONES QUE FLOTAN Y BRILLAN */
        .btn {
            display: block;
            background: transparent;
            border: 2px solid #ffffff;
            color: white;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            
            /* Animación de flotar (subir y bajar) */
            animation: float 3s ease-in-out infinite;
        }

        /* Desfase para que no floten todos a la vez */
        .btn:nth-child(2) { animation-delay: 0.2s; }
        .btn:nth-child(3) { animation-delay: 0.4s; }
        .btn:nth-child(4) { animation-delay: 0.6s; }
        .btn:nth-child(5) { animation-delay: 0.8s; }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            transform: scaleX(1.1); /* Efecto stretched */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .telegram-user {
            margin-top: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SISTEMA OPERATIVO</h1>
        
        <a href="https://www.tiktok.com/@shakalaketo" class="btn">TIKTOK</a>
        <a href="#" class="btn">ROBLOX</a>
        <a href="https://steamcommunity.com/profiles/76561198790173153/" class="btn">STEAM</a>
        <a href="#" class="btn">DISCORD</a>
        <a href="https://t.me/Ketoand" class="btn">TELEGRAM</a>

        <p class="telegram-user">@Ketoand</p>
    </div>

</body>
</html>
