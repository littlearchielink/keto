<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketoand Startpage</title>
    <style>
        body {
            /* FONDO CON TU GIF (Link directo de Imgur) */
            background-image: url('https://i.imgur.com/MkEjw6u.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #0a0a0a;

            /* CENTRADO TOTAL */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* BOTONES TRANSPARENTES QUE FLOTAN */
        .btn {
            display: block;
            background: rgba(0, 0, 0, 0.4); /* Un toque oscuro para que se lea bien */
            border: 2px solid #ffffff;
            color: white;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(2px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            
            /* Animación de flotar */
            animation: float 3s ease-in-out infinite;
        }

        /* Desfase para que no floten todos igual */
        .btn:nth-child(2) { animation-delay: 0.2s; }
        .btn:nth-child(3) { animation-delay: 0.4s; }
        .btn:nth-child(4) { animation-delay: 0.6s; }
        .btn:nth-child(5) { animation-delay: 0.8s; }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: scaleX(1.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .telegram-user {
            margin-top: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-shadow: 0 0 5px black;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KETO ALL ACCOUNTS</h1>
        
        <a href="https://www.tiktok.com/@shakalaketo" class="btn">TIKTOK</a>
        <a href="https://www.roblox.com/es/users/4693048699/profile" class="btn">ROBLOX</a>
        <a href="https://steamcommunity.com/profiles/76561198790173153/" class="btn">STEAM</a>
        <a href="https://discord.gg/TUyNZdn2" class="btn">DISCORD</a>
        <a href="https://t.me/Ketoand" class="btn">TELEGRAM</a>

        <p class="telegram-user">@Ketoand</p>
    </div>

</body>
</html>
